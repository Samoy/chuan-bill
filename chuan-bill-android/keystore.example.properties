# 签名配置 - 此文件仅用于本地开发，请勿提交到仓库
# 将此文件复制为 keystore.properties 并填入实际值

KEYSTORE_FILE=chuanbill.jks
KEYSTORE_PASSWORD=your_keystore_password
KEY_ALIAS=your_key_alias
KEY_PASSWORD=your_key_password

# ==============================
# CI/CD 流水线配置说明（不使用此文件）
# ==============================
# JKS 文件不提交到 Git，CI 中通过 Base64 环境变量传递：
#
# 1. 本地生成 Base64：
#    base64 -i chuanbill.jks | tr -d '\n'
#
# 2. 在 CI 平台设置以下 Secrets：
#    KEYSTORE_BASE64   = 上一步输出的 Base64 字符串
#    KEYSTORE_PASSWORD = 密钥库密码
#    KEY_ALIAS         = 密钥别名
#    KEY_PASSWORD      = 密钥密码