    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chuan-bill-network

  frontend:
    build:
      context: ./chuan-bill-app
      dockerfile: Dockerfile
    container_name: chuan-bill-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chuan-bill-network

  mysql:
    image: mysql:8.0
    container_name: chuan-bill-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=chuan_bill
    volumes:
      - mysql_data:/var/lib/mysql
      - ./chuan-bill-server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chuan-bill-network

  redis:
    image: redis:6-alpine
    container_name: chuan-bill-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chuan-bill-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  chuan-bill-network:
    driver: bridge
