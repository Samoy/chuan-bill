name: Build

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 后端构建
  # ──────────────────────────────────────────────
  build-backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chuan-bill-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & Package
        run: mvn clean package -DskipTests -B
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: chuan-bill-server/target/*.jar
          retention-days: 7

  # ──────────────────────────────────────────────
  # 前端构建
  # ──────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chuan-bill-app

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: chuan-bill-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build (H5)
        run: pnpm build:h5

      - name: Build (Android)
        run: pnpm build:app

      - name: Build (MP-Weixin)
        run: pnpm build:mp-weixin

      - name: Upload h5 build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-h5
          path: chuan-bill-app/dist/build/h5
          retention-days: 7

      - name: Upload app build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: chuan-bill-app/dist/build/app
          retention-days: 7
      - name: Upload mp-weixin build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-mp-weixin
          path: chuan-bill-app/dist/build/mp-weixin
          retention-days: 7

  # ──────────────────────────────────────────────
  # Android构建
  # ──────────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    needs: [ build-frontend ]
    defaults:
      run:
        working-directory: chuan-bill-android
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Download app build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-app
          path: chuan-bill-app/dist/build/app

      - name: Fix Gradle distribution URL
        run: |
          sed -i 's|https\://mirrors.cloud.tencent.com/gradle|https\://services.gradle.org|' gradle/wrapper/gradle-wrapper.properties

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: chuan-bill-android/app/build.gradle

      - name: Build APK
        run: bash scripts/build-apk.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: chuan-bill-android/app/build/outputs/apk/release/chuan-bill-*.apk
          retention-days: 7

  # ──────────────────────────────────────────────
  # Docker 镜像构建
  # ──────────────────────────────────────────────
  build-docker-images:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [ build-frontend, build-backend ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./chuan-bill-app
          push: false
          tags: chuan-bill-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./chuan-bill-server
          push: false
          tags: chuan-bill-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

